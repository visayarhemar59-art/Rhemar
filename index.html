<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personal Profile</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        display: flex;
        width: 750px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        background: white;
    }

    .left {
        background-color: #556B2F; /* olive green */
        width: 35%;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .left img {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        border: 6px solid white;
        object-fit: cover;
    }

    .right {
        width: 65%;
        padding: 25px;
        color: black;
    }

    .right h2 {
        margin-bottom: 15px;
        border-left: 5px solid #556B2F;
        padding-left: 10px;
    }

    .info {
        margin: 10px 0;
        border-bottom: 1px solid #ddd;
        padding-bottom: 5px;
    }

    .label {
        font-weight: bold;
        color: #556B2F;
    }
</style>
</head>
<body>

<div class="card">
    <div class="left">
        <img src="image/rr.jpeg" alt="Profile Image">
    </div>

    <div class="right">
        <h2>Rhemar Y. Visaya</h2>

        <div class="info">
            <span class="label">Status:</span> Single
        </div>

        <div class="info">
            <span class="label">Address:</span> Poblacion, Diplahan, Zamboanga Sibugay
        </div>

        <div class="info">
            <span class="label">Age:</span> 19
        </div>

        <div class="info">
            <span class="label">Gender:</span> Male
        </div>

        <div class="info">
            <span class="label">Program:</span> BSIT
        </div>

    </div>
</div>

</body>
</html>
